<!DOCTYPE html>
<html>
<head>
  <title>OpenClaw Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(5, 60px);
      grid-template-rows: repeat(5, 60px);
      gap: 5px;
      justify-content: center;
      margin: 20px auto;
    }

    .cell {
      width: 60px;
      height: 60px;
      border: 1px solid black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      background-color: #f5f5f5;
    }

    button {
      margin: 5px;
      padding: 10px 15px;
      font-size: 16px;
    }

    #result, #position, #timer {
      margin-top: 10px;
      font-size: 20px;
    }
    #instructions {
      margin-top: 10px;
      font-size: 18px;
    }
    .claw-cell {
      background-color: lightblue;
      border: 2px solid blue;
    }

    .prize-cell {
      background-color: lightgoldenrodyellow;
      border: 2px solid goldenrod;
    }

    .empty-cell {
      background-color: #f8f8f8;
    }    
  .cell {
    width: 60px;
    height: 60px;
    border: 1px solid black;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    background-color: #f5f5f5;
    border-radius: 8px;
  }
  #timer {
    font-weight: bold;
  }
  </style>
</head>
<body>
  <h1>OpenClaw</h1>

  <h2 id="timer">Time: 0</h2>
  <div id="score">Wins: 0 | Misses: 0</div>
  <div id="position">X: 0, Y: 0</div>
  <div id="result"></div>
  <div id="prizeCount">Prizes left: 0</div>
  <div id="instructions">
    Use arrow keys to move and Space to drop.
  </div>
  <div id="level">Level: 1</div>
  
<button id="startBtn" onclick="startGame()">START</button>
<button id="resetBtn" onclick="resetScore()">Reset Score</button>
<button id="restartBtn" onclick="restartGame()">Restart Game</button>
<br><br>

<button id="leftBtn" onclick="move('left')">Left</button>
<button id="rightBtn" onclick="move('right')">Right</button>
<button id="forwardBtn" onclick="move('forward')">Forward</button>
<button id="backBtn" onclick="move('back')">Back</button>

<br><br>
<button id="dropBtn" onclick="drop()">DROP</button>

  <div id="grid"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    const gridSize = 5;
    let claw = { x: 0, y: 0 };
    let prizes = [];
    let wins = 0;
    let misses = 0;
    let gameActive = false;
    let level = 1;

    socket.on('prizes', (newPrizes) => {
      prizes = newPrizes;
      updatePrizeCount();
      drawGrid();
    });
    function updateScore() {
       document.getElementById('score').innerText = `Wins: ${wins} | Misses: ${misses}`;
    }
    function updatePrizeCount() {
      document.getElementById('prizeCount').innerText = `Prizes left: ${prizes.length}`;
    }
    function updateButtons() {
      document.getElementById('startBtn').disabled = gameActive;
      document.getElementById('leftBtn').disabled = !gameActive;
      document.getElementById('rightBtn').disabled = !gameActive;
      document.getElementById('forwardBtn').disabled = !gameActive;
      document.getElementById('backBtn').disabled = !gameActive;
      document.getElementById('dropBtn').disabled = !gameActive;
      document.getElementById('restartBtn').disabled = gameActive;
      document.getElementById('resetBtn').disabled = gameActive;
    }
    function updateLevelDisplay() {
      document.getElementById('level').innerText = `Level: ${level}`;
    }
    function drawGrid() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      for (let y = 0; y < gridSize; y++) {
        for (let x = 0; x < gridSize; x++) {
          const cell = document.createElement('div');
          cell.className = 'cell';

          const hasPrize = prizes.some(p => p.x === x && p.y === y);

          if (x === claw.x && y === claw.y) {
            cell.innerText = '🕹️';
            cell.classList.add('claw-cell');
          } else if (hasPrize) {
            cell.innerText = '🎁';
            cell.classList.add('prize-cell');
          } else {
            cell.innerText = '';
            cell.classList.add('empty-cell');
          }

          grid.appendChild(cell);
        }
      }
    }
    function startGame() {
      gameActive = true;
      updateButtons();
      updateTimerDisplay(30);
      socket.emit('start');
    }
    function restartGame() {
      socket.emit('restart');
    }
    function move(direction) {
      socket.emit('move', direction);
    }

    function drop() {
      socket.emit('drop');
    }

    function resetScore() {
      wins = 0;
      misses = 0;
      updateScore();

      document.getElementById('result').innerText = '';
      document.getElementById('result').style.color = 'black';
    }
    function updateTimerDisplay(time) {
      const timerEl = document.getElementById('timer');
      timerEl.innerText = `Time: ${time}`;

      if (time <= 5) {
        timerEl.style.color = 'red';
      } else if (time <= 10) {
        timerEl.style.color = 'orange';
      } else {
        timerEl.style.color = 'black';
      }
    }    

  document.addEventListener('keydown', (event) => {
      if (!gameActive) return;

      if (event.key === 'ArrowLeft') {
        move('left');
      } else if (event.key === 'ArrowRight') {
        move('right');
      } else if (event.key === 'ArrowUp') {
        move('forward');
      } else if (event.key === 'ArrowDown') {
        move('back');
      } else if (event.key === ' ') {
        event.preventDefault();
        drop();
      }
    });

    socket.on('level', (newLevel) => {
      level = newLevel;
      updateLevelDisplay();
    });
    socket.on('timer', (time) => {
      updateTimerDisplay(time);
    });

    socket.on('position', (pos) => {
      claw = pos;
      document.getElementById('position').innerText = `X: ${pos.x}, Y: ${pos.y}`;
      drawGrid();
    });

socket.on('result', (msg) => {
  console.log('result message:', msg);
  const resultEl = document.getElementById('result');
  resultEl.innerText = msg;

  if (msg === 'Prize collected!') {
    resultEl.style.color = 'green';
  } else if (msg === 'Level complete!') {
    resultEl.style.color = 'blue';
    wins++;
    gameActive = false;
  } else if (msg === 'YOU BEAT THE GAME!') {
    resultEl.style.color = 'green';
    wins++;
    gameActive = false;
  } else if (msg === 'Almost! Try again!') {
    resultEl.style.color = 'purple';
  } else if (msg === 'Missed!') {
    resultEl.style.color = 'red';
  } else if (msg === 'Game Over!') {
    resultEl.style.color = 'orange';
    gameActive = false;
  } else if (msg === 'Game reset!') {
  resultEl.style.color = 'black';
  gameActive = false;
  } else {
    resultEl.style.color = 'black';
  }

  updateScore();
  updateButtons();
});// 👇 PUT IT HERE (very bottom of script)
updateScore();
updateButtons();
updatePrizeCount();
updateLevelDisplay();
updateTimerDisplay(0);
drawGrid();
  </script>
</body>
</html>
