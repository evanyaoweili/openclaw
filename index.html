<!DOCTYPE html>
<html>
<head>
  <title>OpenClaw</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      font-size: 20px;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(5, 60px);
      grid-template-rows: repeat(5, 60px);
      gap: 5px;
      justify-content: center;
      margin: 20px auto;
    }

    .cell {
      width: 60px;
      height: 60px;
      border: 1px solid black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      background: #f5f5f5;
      border-radius: 8px;
    }

    .claw-cell {
      background: lightblue;
      border: 2px solid blue;
    }

    .prize-cell {
      background: lightgoldenrodyellow;
      border: 2px solid goldenrod;
    }

    button {
      margin: 5px;
      padding: 10px 15px;
      font-size: 16px;
    }

    #result, #position {
      margin-top: 12px;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>OpenClaw</h1>

  <div id="position">X: 2, Y: 0</div>
  <div id="result">Loading...</div>

  <br>

  <button id="leftBtn" onclick="move('left')">Left</button>
  <button id="rightBtn" onclick="move('right')">Right</button>
  <button id="dropBtn" onclick="dropClaw()">DROP</button>
  <button id="resetBtn" onclick="resetGame()">Reset</button>

  <div id="grid"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    const gridSize = 5;
    let claw = { x: 2, y: 0 };
    let prizes = [];
    let clawBusy = false;

    function drawGrid() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      for (let y = 0; y < gridSize; y++) {
        for (let x = 0; x < gridSize; x++) {
          const cell = document.createElement('div');
          cell.className = 'cell';

          const hasPrize = prizes.some(p => p.x === x && p.y === y);

          if (x === claw.x && y === claw.y) {
            cell.innerText = '🕹️';
            cell.classList.add('claw-cell');
          } else if (hasPrize) {
            cell.innerText = '🎁';
            cell.classList.add('prize-cell');
          }

          grid.appendChild(cell);
        }
      }
    }

    function updatePosition() {
      document.getElementById('position').innerText = `X: ${claw.x}, Y: ${claw.y}`;
    }

    function updateButtons() {
      document.getElementById('leftBtn').disabled = clawBusy;
      document.getElementById('rightBtn').disabled = clawBusy;
      document.getElementById('dropBtn').disabled = clawBusy;
    }

    function move(direction) {
      if (clawBusy) return;
      socket.emit('move', direction);
    }

    function dropClaw() {
      if (clawBusy) return;
      socket.emit('drop');
    }

    function resetGame() {
      socket.emit('reset');
    }

    document.addEventListener('keydown', (event) => {
      if (clawBusy) return;

      if (event.key === 'ArrowLeft') {
        event.preventDefault();
        move('left');
      } else if (event.key === 'ArrowRight') {
        event.preventDefault();
        move('right');
      } else if (event.code === 'Space') {
        event.preventDefault();
        dropClaw();
      }
    });

    socket.on('position', (pos) => {
      claw = pos;
      updatePosition();
      drawGrid();
    });

    socket.on('prizes', (newPrizes) => {
      prizes = newPrizes;
      drawGrid();
    });

    socket.on('busy', (isBusy) => {
      clawBusy = isBusy;
      updateButtons();
    });

    socket.on('result', (msg) => {
      document.getElementById('result').innerText = msg;
    });

    drawGrid();
    updateButtons();
  </script>
</body>
</html>
